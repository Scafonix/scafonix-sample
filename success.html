<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Payment Successful - LoreWeaver AI</title>
        <!-- Premium Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg-color: #faf8f5; /* Warm Luxury Ivory / Parchment */
                --card-bg: #ffffff; /* Pure White Card */
                --card-border: rgba(171, 142, 103, 0.25); /* Gold filigree border */
                --text-primary: #1c1b18; /* Warm Near-Black */
                --text-secondary: #706255; /* Soft Muted Brown */
                --accent-gold: #ab8e67; /* Classic Antique Gold */
                --accent-gold-hover: #967a54;
                --glow-color: rgba(171, 142, 103, 0.12);
                --font-sans: "Space Grotesk", "Inter", sans-serif;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: var(--font-sans);
                background-color: var(--bg-color);
                background-image:
                    radial-gradient(
                        circle at 10% 20%,
                        rgba(171, 142, 103, 0.05) 0%,
                        transparent 40%
                    ),
                    radial-gradient(
                        circle at 90% 80%,
                        rgba(139, 92, 246, 0.02) 0%,
                        transparent 50%
                    );
                color: var(--text-primary);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 20px;
                overflow-x: hidden;
            }

            /* Success Container */
            .success-container {
                width: 100%;
                max-width: 500px;
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                border-radius: 24px;
                padding: 40px 30px;
                text-align: center;
                box-shadow: 0 20px 45px rgba(171, 142, 103, 0.12);
                animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            }

            /* Glowing Checkmark Badge */
            .success-badge {
                width: 80px;
                height: 80px;
                background: rgba(171, 142, 103, 0.06);
                border: 2px solid var(--accent-gold);
                border-radius: 50%;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 25px;
                box-shadow: 0 0 20px rgba(171, 142, 103, 0.2);
                animation: pulseGlow 2s infinite;
            }

            .success-badge svg {
                width: 36px;
                height: 36px;
                stroke: var(--accent-gold);
                stroke-width: 3;
                fill: none;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            .success-title {
                font-size: 1.8rem;
                font-weight: 700;
                color: var(--text-primary);
                margin-bottom: 10px;
                letter-spacing: -0.5px;
            }

            .success-desc {
                font-size: 0.95rem;
                color: var(--text-secondary);
                line-height: 1.5;
                margin-bottom: 30px;
            }

            .back-link {
                display: inline-block;
                color: var(--text-secondary);
                font-size: 0.85rem;
                text-decoration: none;
                transition: color 0.2s ease;
            }

            .back-link:hover {
                color: var(--text-primary);
            }

            /* Keyframe Animations */
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(30px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes pulseGlow {
                0%, 100% {
                    box-shadow: 0 0 20px rgba(171, 142, 103, 0.2);
                    border-color: var(--accent-gold);
                }
                50% {
                    box-shadow: 0 0 35px rgba(171, 142, 103, 0.35);
                    border-color: var(--accent-gold-hover);
                }
            }
        </style>
    </head>
    <body>
        <div class="success-container">
            <!-- Glowing Success Badge -->
            <div class="success-badge">
                <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <h1 class="success-title">Payment Successful</h1>
            <p class="success-desc">
                Thank you for your purchase. Your payment was verified successfully and your AI Novel files are now unlocked.
            </p>

            <a href="index.html" class="back-link">
                ← Return to Store
            </a>
        </div>
    </body>
</html>
